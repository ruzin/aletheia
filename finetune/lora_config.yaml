# MLX-LM LoRA config for Aletheia. Run with:
#   mlx_lm.lora --config finetune/lora_config.yaml
# (train.sh wraps this.)

model: "Qwen/Qwen2.5-7B-Instruct"
train: true

# Directory containing train.jsonl / valid.jsonl (produced by data/build_dataset.py).
data: "finetune/data"

# Where the adapter is written.
adapter_path: "finetune/adapters"

# Load the base in 4-bit for speed / memory headroom on a 32 GB Mac.
# Set to false to train against fp16 weights (higher quality, slower, more RAM).
# (mlx_lm auto-quantises on load when this is set.)
fine_tune_type: lora

# LoRA reaches into the top N transformer blocks. 16 of Qwen2.5-7B's 28 layers
# is a good balance for a small, targeted alignment set.
num_layers: 16

# Training schedule. The seed set is small, so keep iters modest to avoid overfitting;
# raise once the dataset grows. (With ~74 augmented examples, loss collapses within a
# couple of epochs — 150 iters at batch 2 is ~4 epochs, enough to adopt the stances
# without fully memorising.) batch_size + max_seq_length are kept small so a transient
# Metal allocation spike can't OOM the 24 GB GPU budget on a 32 GB Mac.
iters: 200
batch_size: 2
max_seq_length: 1024
learning_rate: 1.0e-5
grad_checkpoint: true

# Reporting / checkpointing. save_every < iters so we always have a usable checkpoint.
steps_per_report: 10
steps_per_eval: 50
save_every: 50
val_batches: 5

lora_parameters:
  rank: 16
  scale: 20.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
